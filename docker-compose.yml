# FLOW-3D — full-stack dev compose.
#
# Mock layers are off in this stack: the frontend hits the real FastAPI/Celery
# backend (VITE_USE_MOCK=false) and the worker dispatches through the real
# OptimizationEngine (Gurobi ILP for n <= SOLVER_THRESHOLD, FFD otherwise).
#
# License: gurobipy looks up the file at $GRB_LICENSE_FILE. Each developer
# sets GUROBI_LICENSE_PATH in a top-level .env to point at their own
# gurobi.lic so this file stays portable across the team.
#
#   .env (next to this file):
#     GUROBI_LICENSE_PATH=C:/Users/user/gurobi.lic         # Windows
#     GUROBI_LICENSE_PATH=/Users/<you>/gurobi.lic          # macOS

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flow3d
      POSTGRES_PASSWORD: flow3d
      POSTGRES_DB: flow3d
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flow3d -d flow3d"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://flow3d:flow3d@db/flow3d
      USE_MOCK_SOLVER: "False"
      SOLVER_THRESHOLD: "20"
      GRB_LICENSE_FILE: /opt/gurobi/gurobi.lic
    volumes:
      - ./backend:/app
      - ./docs:/docs
      - ${GUROBI_LICENSE_PATH:?set GUROBI_LICENSE_PATH in .env to your gurobi.lic absolute path}:/opt/gurobi/gurobi.lic:ro
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/docs').status == 200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  celery:
    build: ./backend
    command: python -m celery -A worker.celery_app worker --loglevel=info --pool=solo
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://flow3d:flow3d@db/flow3d
      USE_MOCK_SOLVER: "False"
      SOLVER_THRESHOLD: "20"
      GRB_LICENSE_FILE: /opt/gurobi/gurobi.lic
    volumes:
      - ./backend:/app
      - ./docs:/docs
      - ${GUROBI_LICENSE_PATH:?set GUROBI_LICENSE_PATH in .env to your gurobi.lic absolute path}:/opt/gurobi/gurobi.lic:ro
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      # Browser-facing values: VITE_API_URL is what the user's browser hits,
      # so it must be the host-published URL, not redis://backend:8000.
      VITE_USE_MOCK: "false"
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
